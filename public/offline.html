<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Sem conexão — Nailit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0A0818;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #2A1A50, #150E30);
      border: 1.5px solid rgba(157,127,212,0.3);
      border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin-bottom: 24px;
      box-shadow: 0 20px 60px rgba(124,92,191,0.3);
    }
    h1 {
      font-size: 22px; font-weight: 900;
      color: #fff; margin-bottom: 8px; text-align: center;
    }
    p {
      font-size: 13px; color: rgba(157,127,212,0.7);
      text-align: center; line-height: 1.6; max-width: 280px;
      margin-bottom: 32px;
    }
    button {
      height: 52px; padding: 0 32px;
      border-radius: 20px; border: none;
      background: linear-gradient(135deg, #1E1A2E, #7C5CBF);
      color: white; font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.15em;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(124,92,191,0.35);
    }
    .logo {
      font-family: Georgia, serif; font-style: italic;
      font-size: 18px; color: rgba(196,168,232,0.5);
      position: fixed; bottom: max(24px, env(safe-area-inset-bottom));
    }
  </style>
</head>
<body>
  <div class="icon">📶</div>
  <h1>Sem conexão</h1>
  <p>Você está offline. Verifique sua internet e tente novamente.</p>
  <button onclick="window.location.reload()">Tentar novamente</button>
  <div class="logo">nailit</div>
</body>
</html>
