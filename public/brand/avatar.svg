<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE5FF"/>
      <stop offset="100%" stop-color="#C4A8E8"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A1A0E"/>
      <stop offset="60%" stop-color="#1A0D08"/>
      <stop offset="100%" stop-color="#3D2010"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#C8956A"/>
      <stop offset="100%" stop-color="#B07848"/>
    </linearGradient>
    <linearGradient id="clothGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9D7FD4"/>
      <stop offset="100%" stop-color="#7C5CBF"/>
    </linearGradient>
    <radialGradient id="cheekL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8946A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8946A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cheekR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8946A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8946A" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="200" cy="200" r="196"/>
    </clipPath>
  </defs>

  <!-- Fundo circular gradiente -->
  <circle cx="200" cy="200" r="200" fill="url(#bgGrad)"/>
  
  <!-- Ornamento sutil de fundo -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="#9D7FD4" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#9D7FD4" stroke-width="0.5" opacity="0.15"/>

  <!-- Estrelinhas decorativas -->
  <text x="48" y="75" font-size="20" fill="#9D7FD4" opacity="0.6">✦</text>
  <text x="335" y="95" font-size="14" fill="#9D7FD4" opacity="0.5">✦</text>
  <text x="60" y="320" font-size="12" fill="#9D7FD4" opacity="0.4">✦</text>
  <text x="330" y="330" font-size="16" fill="#9D7FD4" opacity="0.5">✦</text>

  <g clip-path="url(#circleClip)">

    <!-- ── CABELO FUNDO (atrás do corpo) ─────────────────────────── -->
    <!-- Cabelo volumoso cacheado - camada de fundo -->
    <ellipse cx="200" cy="195" rx="115" ry="155" fill="url(#hairGrad)"/>
    
    <!-- Cachos laterais esquerdo -->
    <path d="M 88 185 Q 72 220 78 260 Q 82 290 90 310 Q 86 270 92 240 Q 96 215 88 185Z" fill="#1A0D08"/>
    <path d="M 80 200 Q 65 235 70 270 Q 74 300 82 320 Q 78 280 84 255 Q 88 228 80 200Z" fill="#2A1A0E"/>
    <path d="M 95 175 Q 80 205 82 240 Q 86 265 96 285 Q 90 255 96 230 Q 100 208 95 175Z" fill="#1A0D08"/>
    
    <!-- Cachos laterais direito -->
    <path d="M 312 185 Q 328 220 322 260 Q 318 290 310 310 Q 314 270 308 240 Q 304 215 312 185Z" fill="#1A0D08"/>
    <path d="M 320 200 Q 335 235 330 270 Q 326 300 318 320 Q 322 280 316 255 Q 312 228 320 200Z" fill="#2A1A0E"/>
    <path d="M 305 175 Q 320 205 318 240 Q 314 265 304 285 Q 310 255 304 230 Q 300 208 305 175Z" fill="#1A0D08"/>

    <!-- ── PESCOÇO E OMBROS ────────────────────────────────────────── -->
    <!-- Ombros / top -->
    <path d="M 100 400 L 100 310 Q 140 290 200 285 Q 260 290 300 310 L 300 400Z" fill="url(#clothGrad)"/>
    
    <!-- Detalhe do top (alcinha) -->
    <path d="M 162 290 Q 165 275 175 268 Q 185 262 190 258" stroke="#C4A8E8" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 238 290 Q 235 275 225 268 Q 215 262 210 258" stroke="#C4A8E8" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Pescoço -->
    <rect x="178" y="252" width="44" height="42" rx="8" fill="url(#skinGrad)"/>
    <rect x="182" y="255" width="36" height="20" rx="4" fill="#C8956A" opacity="0.4"/>

    <!-- ── ROSTO ───────────────────────────────────────────────────── -->
    <!-- Rosto base - formato oval feminino -->
    <ellipse cx="200" cy="195" rx="80" ry="92" fill="url(#skinGrad)"/>
    
    <!-- Mandíbula suave -->
    <path d="M 128 210 Q 130 260 155 278 Q 175 292 200 294 Q 225 292 245 278 Q 270 260 272 210" fill="url(#skinGrad)"/>

    <!-- Bochechas coradas -->
    <ellipse cx="148" cy="225" rx="28" ry="18" fill="url(#cheekL)"/>
    <ellipse cx="252" cy="225" rx="28" ry="18" fill="url(#cheekR)"/>

    <!-- Sombra suave pescoço/queixo -->
    <path d="M 168 272 Q 200 285 232 272" stroke="#B07848" stroke-width="2" fill="none" opacity="0.3"/>

    <!-- ── CABELO FRENTE ───────────────────────────────────────────── -->
    <!-- Topo da cabeça / raiz -->
    <ellipse cx="200" cy="138" rx="82" ry="52" fill="url(#hairGrad)"/>
    
    <!-- Linha de cabelo natural -->
    <path d="M 125 155 Q 145 138 165 132 Q 185 127 200 126 Q 215 127 235 132 Q 255 138 275 155" fill="url(#hairGrad)"/>
    
    <!-- Fios de cabelo naturais sobre testa -->
    <path d="M 140 155 Q 145 148 152 150 Q 148 158 140 155Z" fill="#2A1A0E" opacity="0.7"/>
    <path d="M 158 142 Q 164 136 170 139 Q 166 147 158 142Z" fill="#2A1A0E" opacity="0.6"/>
    <path d="M 238 148 Q 244 141 250 145 Q 245 152 238 148Z" fill="#2A1A0E" opacity="0.6"/>

    <!-- Cachos no topo - volumosos e cheios -->
    <ellipse cx="165" cy="128" rx="28" ry="22" fill="url(#hairGrad)" transform="rotate(-15,165,128)"/>
    <ellipse cx="200" cy="120" rx="32" ry="24" fill="url(#hairGrad)"/>
    <ellipse cx="235" cy="128" rx="28" ry="22" fill="url(#hairGrad)" transform="rotate(15,235,128)"/>
    
    <!-- Textura cachos -->
    <path d="M 150 125 Q 158 115 166 120 Q 160 130 150 125Z" fill="#3D2010" opacity="0.5"/>
    <path d="M 180 110 Q 190 100 200 106 Q 194 118 180 110Z" fill="#3D2010" opacity="0.5"/>
    <path d="M 218 118 Q 226 108 235 114 Q 228 125 218 118Z" fill="#3D2010" opacity="0.4"/>
    <path d="M 235 130 Q 244 120 252 126 Q 245 136 235 130Z" fill="#3D2010" opacity="0.4"/>

    <!-- ── OLHOS ───────────────────────────────────────────────────── -->
    <!-- Sobrancelha esquerda - natural e expressiva -->
    <path d="M 152 172 Q 163 165 178 167" stroke="#1A0D08" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Sobrancelha direita -->
    <path d="M 222 167 Q 237 165 248 172" stroke="#1A0D08" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Olho esquerdo -->
    <ellipse cx="168" cy="187" rx="18" ry="13" fill="white"/>
    <ellipse cx="170" cy="187" rx="11" ry="11" fill="#3D2010"/>
    <ellipse cx="170" cy="187" rx="7" ry="7" fill="#1A0808"/>
    <ellipse cx="174" cy="183" rx="3" ry="3" fill="white" opacity="0.9"/>
    <ellipse cx="168" cy="190" rx="1.5" ry="1.5" fill="white" opacity="0.5"/>
    <!-- Cílios esquerdo -->
    <path d="M 152 184 Q 155 178 157 183" stroke="#1A0D08" stroke-width="1.5" fill="none"/>
    <path d="M 156 181 Q 160 175 162 180" stroke="#1A0D08" stroke-width="1.5" fill="none"/>
    <path d="M 182 181 Q 185 175 187 180" stroke="#1A0D08" stroke-width="1.5" fill="none"/>
    <path d="M 185 184 Q 188 178 189 183" stroke="#1A0D08" stroke-width="1.5" fill="none"/>
    <!-- Pálpebra suave -->
    <path d="M 150 184 Q 168 178 186 184" stroke="#1A0D08" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Olho direito -->
    <ellipse cx="232" cy="187" rx="18" ry="13" fill="white"/>
    <ellipse cx="230" cy="187" rx="11" ry="11" fill="#3D2010"/>
    <ellipse cx="230" cy="187" rx="7" ry="7" fill="#1A0808"/>
    <ellipse cx="234" cy="183" rx="3" ry="3" fill="white" opacity="0.9"/>
    <ellipse cx="228" cy="190" rx="1.5" ry="1.5" fill="white" opacity="0.5"/>
    <!-- Cílios direito -->
    <path d="M 215 184 Q 212 178 213 183" stroke="#1A0D08" stroke-width="1.5" fill="none"/>
    <path d="M 218 181 Q 215 175 216 180" stroke="#1A0D08" stroke-width="1.5" fill="none"/>
    <path d="M 244 181 Q 240 175 240 180" stroke="#1A0D08" stroke-width="1.5" fill="none"/>
    <path d="M 248 184 Q 245 178 245 183" stroke="#1A0D08" stroke-width="1.5" fill="none"/>
    <path d="M 214 184 Q 232 178 250 184" stroke="#1A0D08" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- ── NARIZ ───────────────────────────────────────────────────── -->
    <path d="M 200 194 Q 196 210 190 216 Q 197 220 200 219 Q 203 220 210 216 Q 204 210 200 194Z" fill="#B07848" opacity="0.35"/>
    <ellipse cx="193" cy="216" rx="5" ry="3.5" fill="#B07848" opacity="0.4"/>
    <ellipse cx="207" cy="216" rx="5" ry="3.5" fill="#B07848" opacity="0.4"/>

    <!-- ── BOCA / SORRISO ─────────────────────────────────────────── -->
    <!-- Sorriso suave e natural -->
    <path d="M 180 236 Q 190 244 200 245 Q 210 244 220 236" stroke="#C87858" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Lábio superior -->
    <path d="M 180 236 Q 188 230 196 232 Q 200 231 204 232 Q 212 230 220 236 Q 210 238 200 238 Q 190 238 180 236Z" fill="#D4886A"/>
    <!-- Lábio inferior -->
    <path d="M 180 236 Q 190 246 200 247 Q 210 246 220 236 Q 210 244 200 245 Q 190 244 180 236Z" fill="#C87858"/>
    <!-- Brilho lábio -->
    <ellipse cx="200" cy="242" rx="8" ry="3" fill="white" opacity="0.2"/>
    <!-- Cantos boca - dimples sutis -->
    <path d="M 178 236 Q 175 238 176 240" stroke="#B07848" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M 222 236 Q 225 238 224 240" stroke="#B07848" stroke-width="1.5" fill="none" opacity="0.5"/>

    <!-- ── BRINCO ───────────────────────────────────────────────────── -->
    <ellipse cx="128" cy="220" rx="6" ry="8" fill="#C4A8E8"/>
    <ellipse cx="128" cy="220" rx="4" ry="5.5" fill="#9D7FD4"/>
    <ellipse cx="272" cy="220" rx="6" ry="8" fill="#C4A8E8"/>
    <ellipse cx="272" cy="220" rx="4" ry="5.5" fill="#9D7FD4"/>

    <!-- ── UNHAS na mão (detalhe nail artist) ────────────────────────── -->
    <!-- Mãozinha pequena no canto inferior -->
    <g transform="translate(295,340) rotate(-20)">
      <rect x="0" y="0" width="20" height="35" rx="4" fill="#C8956A"/>
      <!-- Unhas lilás nas pontas -->
      <rect x="1" y="0" width="7" height="10" rx="3" fill="#9D7FD4"/>
      <rect x="9" y="-1" width="7" height="10" rx="3" fill="#C4A8E8"/>
      <rect x="3" y="0" width="6" height="9" rx="2.5" fill="#B08FE0"/>
    </g>

  </g>

  <!-- Anel decorativo externo -->
  <circle cx="200" cy="200" r="196" fill="none" stroke="url(#clothGrad)" stroke-width="2" opacity="0.4"/>
  
  <!-- Estrelinhas fora do círculo -->
  <text x="22" y="140" font-size="16" fill="#9D7FD4" opacity="0.5">✦</text>
  <text x="360" y="200" font-size="12" fill="#9D7FD4" opacity="0.4">✦</text>
</svg>
