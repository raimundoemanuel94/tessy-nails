<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A2044"/>
      <stop offset="100%" stop-color="#1E1A2E"/>
    </linearGradient>
    <linearGradient id="tn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE5FF"/>
      <stop offset="100%" stop-color="#C4A8E8"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4A8E8"/>
      <stop offset="100%" stop-color="#7C5CBF"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>

  <!-- Glow sutil -->
  <circle cx="380" cy="130" r="200" fill="#9D7FD4" opacity="0.06"/>

  <!-- Anel decorativo -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.3"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#ring)" stroke-width="1" opacity="0.15"/>

  <!-- Florinhas nos 4 pontos cardeais -->
  <g transform="translate(256,68)">
    <circle cx="0" cy="-10" r="7" fill="#C4A8E8" opacity="0.8"/>
    <circle cx="8.7" cy="5" r="7" fill="#C4A8E8" opacity="0.8"/>
    <circle cx="-8.7" cy="5" r="7" fill="#C4A8E8" opacity="0.8"/>
    <circle cx="0" cy="0" r="6" fill="#EDE5FF"/>
  </g>
  <g transform="translate(256,444)">
    <circle cx="0" cy="-10" r="7" fill="#C4A8E8" opacity="0.8"/>
    <circle cx="8.7" cy="5" r="7" fill="#C4A8E8" opacity="0.8"/>
    <circle cx="-8.7" cy="5" r="7" fill="#C4A8E8" opacity="0.8"/>
    <circle cx="0" cy="0" r="6" fill="#EDE5FF"/>
  </g>
  <g transform="translate(68,256) rotate(-90)">
    <circle cx="0" cy="-10" r="6" fill="#9D7FD4" opacity="0.6"/>
    <circle cx="8.7" cy="5" r="6" fill="#9D7FD4" opacity="0.6"/>
    <circle cx="-8.7" cy="5" r="6" fill="#9D7FD4" opacity="0.6"/>
    <circle cx="0" cy="0" r="5" fill="#C4A8E8"/>
  </g>
  <g transform="translate(444,256) rotate(90)">
    <circle cx="0" cy="-10" r="6" fill="#9D7FD4" opacity="0.6"/>
    <circle cx="8.7" cy="5" r="6" fill="#9D7FD4" opacity="0.6"/>
    <circle cx="-8.7" cy="5" r="6" fill="#9D7FD4" opacity="0.6"/>
    <circle cx="0" cy="0" r="5" fill="#C4A8E8"/>
  </g>

  <!-- Monograma TN cursivo grande -->
  <text x="86" y="330" font-family="Georgia, 'Times New Roman', serif"
    font-size="240" font-style="italic" font-weight="400"
    fill="url(#tn)" letter-spacing="-10">TN</text>

  <!-- Sublinhado curvo ornamental -->
  <path d="M 100 358 Q 256 385 412 358"
    stroke="url(#ring)" stroke-width="4" fill="none" opacity="0.7"/>
  <circle cx="100" cy="358" r="6" fill="#C4A8E8" opacity="0.8"/>
  <circle cx="412" cy="358" r="6" fill="#C4A8E8" opacity="0.8"/>
  <circle cx="256" cy="385" r="5" fill="#9D7FD4" opacity="0.6"/>
</svg>
