<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4A8E8"/>
      <stop offset="100%" stop-color="#7C5CBF"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE5FF"/>
      <stop offset="100%" stop-color="#C4A8E8"/>
    </linearGradient>
  </defs>

  <!-- Círculo base com gradiente suave -->
  <circle cx="100" cy="100" r="92" fill="url(#grad)" opacity="0.15"/>
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#grad)" stroke-width="1.5" opacity="0.6"/>

  <!-- Florzinhas decorativas nos 4 cantos -->
  <!-- Top left -->
  <g transform="translate(32,32) rotate(-30)">
    <circle cx="0" cy="-6" r="3.5" fill="#C4A8E8" opacity="0.7"/>
    <circle cx="5.2" cy="3" r="3.5" fill="#C4A8E8" opacity="0.7"/>
    <circle cx="-5.2" cy="3" r="3.5" fill="#C4A8E8" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#EDE5FF"/>
  </g>
  <!-- Top right -->
  <g transform="translate(168,32) rotate(30)">
    <circle cx="0" cy="-6" r="3.5" fill="#C4A8E8" opacity="0.7"/>
    <circle cx="5.2" cy="3" r="3.5" fill="#C4A8E8" opacity="0.7"/>
    <circle cx="-5.2" cy="3" r="3.5" fill="#C4A8E8" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#EDE5FF"/>
  </g>
  <!-- Bottom left -->
  <g transform="translate(32,168) rotate(30)">
    <circle cx="0" cy="-6" r="3.5" fill="#C4A8E8" opacity="0.7"/>
    <circle cx="5.2" cy="3" r="3.5" fill="#C4A8E8" opacity="0.7"/>
    <circle cx="-5.2" cy="3" r="3.5" fill="#C4A8E8" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#EDE5FF"/>
  </g>
  <!-- Bottom right -->
  <g transform="translate(168,168) rotate(-30)">
    <circle cx="0" cy="-6" r="3.5" fill="#C4A8E8" opacity="0.7"/>
    <circle cx="5.2" cy="3" r="3.5" fill="#C4A8E8" opacity="0.7"/>
    <circle cx="-5.2" cy="3" r="3.5" fill="#C4A8E8" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#EDE5FF"/>
  </g>

  <!-- Folhinhas laterais decorativas -->
  <ellipse cx="20" cy="100" rx="6" ry="10" fill="#9D7FD4" opacity="0.3" transform="rotate(-20,20,100)"/>
  <ellipse cx="180" cy="100" rx="6" ry="10" fill="#9D7FD4" opacity="0.3" transform="rotate(20,180,100)"/>

  <!-- Monograma TN em fonte cursiva (path) -->
  <!-- T cursivo -->
  <text x="44" y="126" font-family="Georgia, 'Times New Roman', serif"
    font-size="88" font-style="italic" font-weight="400"
    fill="url(#grad)" letter-spacing="-4">TN</text>

  <!-- Sublinhado ornamental -->
  <path d="M 52 138 Q 100 148 148 138" stroke="url(#grad2)" stroke-width="1.5" fill="none" opacity="0.8"/>

  <!-- Pontinhos ornamentais no sublinhado -->
  <circle cx="52" cy="138" r="2.5" fill="#C4A8E8" opacity="0.8"/>
  <circle cx="148" cy="138" r="2.5" fill="#C4A8E8" opacity="0.8"/>
  <circle cx="100" cy="148" r="2" fill="#9D7FD4" opacity="0.6"/>
</svg>
