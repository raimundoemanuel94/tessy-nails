<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90" fill="none">
  <defs>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4A8E8"/>
      <stop offset="55%" stop-color="#9D7FD4"/>
      <stop offset="100%" stop-color="#6B4BAF"/>
    </linearGradient>
    <linearGradient id="dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EDE5FF"/>
      <stop offset="100%" stop-color="#C4A8E8"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#C4A8E8"/>
      <stop offset="100%" stop-color="#7C5CBF"/>
    </linearGradient>
  </defs>
  <!-- Esmalte ícone -->
  <rect x="8"  y="28" width="26" height="42" rx="13" fill="url(#bottle)"/>
  <rect x="12" y="16" width="18" height="16" rx="6"  fill="#7C5CBF"/>
  <rect x="11" y="30" width="7"  height="26" rx="3.5" fill="white" opacity="0.2"/>
  <circle cx="17" cy="34" r="3" fill="white" opacity="0.3"/>
  <!-- Wordmark -->
  <text x="46" y="64"
    font-family="Georgia,'Times New Roman',serif"
    font-size="52" font-weight="700" font-style="italic"
    fill="url(#lg)" letter-spacing="-1.5">nailit</text>
  <!-- Ponto decorativo sobre o i -->
  <circle cx="183" cy="20" r="6" fill="url(#dot)"/>
  <!-- Tagline -->
  <text x="48" y="80"
    font-family="-apple-system,Helvetica,sans-serif"
    font-size="9.5" font-weight="600" letter-spacing="0.4em"
    fill="#9D7FD4" opacity="0.65">BEAUTY PLATFORM</text>
</svg>
