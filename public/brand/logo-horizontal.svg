<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" fill="none">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4A8E8"/>
      <stop offset="100%" stop-color="#7C5CBF"/>
    </linearGradient>
  </defs>

  <!-- Ícone circular -->
  <circle cx="40" cy="40" r="36" fill="#7C5CBF" opacity="0.12"/>
  <circle cx="40" cy="40" r="33" fill="none" stroke="url(#g1)" stroke-width="1.2" opacity="0.5"/>

  <!-- Florinha topo -->
  <g transform="translate(40,12)">
    <circle cx="0" cy="-4" r="2.5" fill="#C4A8E8" opacity="0.8"/>
    <circle cx="3.5" cy="2" r="2.5" fill="#C4A8E8" opacity="0.8"/>
    <circle cx="-3.5" cy="2" r="2.5" fill="#C4A8E8" opacity="0.8"/>
    <circle cx="0" cy="0" r="2" fill="#EDE5FF"/>
  </g>

  <!-- TN monograma -->
  <text x="17" y="52" font-family="Georgia, serif" font-size="36"
    font-style="italic" fill="url(#g1)" letter-spacing="-2">TN</text>

  <!-- Sublinhado -->
  <path d="M 20 56 Q 40 61 60 56" stroke="#C4A8E8" stroke-width="1" fill="none" opacity="0.7"/>

  <!-- Nome -->
  <text x="92" y="33" font-family="Georgia, serif" font-size="26"
    font-style="italic" fill="#1E1A2E" letter-spacing="1">Nailit</text>

  <!-- Subtítulo -->
  <text x="94" y="54" font-family="-apple-system, Helvetica, sans-serif" font-size="11"
    font-weight="500" fill="#9B8FC0" letter-spacing="3">MANICURE &amp; PEDICURE</text>

  <!-- Linha decorativa -->
  <line x1="88" y1="38" x2="90" y2="62" stroke="#DDD5F5" stroke-width="1"/>
</svg>
